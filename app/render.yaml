services:
  - type: web
    name: vidyaspark
    runtime: node
    plan: starter
    rootDir: app
    buildCommand: cd client && npm install && npx vite build && cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 3001
